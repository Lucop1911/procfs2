name: Rust

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM: same

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [1.85.0, stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Check compilation
        run: cargo check --all-features

      - name: Run tests
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri

      - name: Run Miri on core parsing logic
        run: |
          cargo miri test --features "serde,macros" --lib -- procfs2::util::

  fuzz:
    name: Cargo Fuzz (nightly)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*, 'fuzz')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz targets (60s each)
        run: |
          cd fuzz
          cargo fuzz run parse_proc_stat -- -max_total_time=60 || true
          cargo fuzz run parse_proc_meminfo -- -max_total_time=60 || true
          cargo fuzz run parse_proc_maps -- -max_total_time=60 || true

  msrv-check:
    name: MSRV 1.85 Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0

      - name: Check with MSRV
        run: cargo check --all-features
